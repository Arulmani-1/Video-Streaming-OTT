<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog - STACKLY STREAM</title>
    <!-- Stylesheets -->
    <link rel="stylesheet" href="css/index.css">
    <link rel="stylesheet" href="css/navbar.css">
    <link rel="stylesheet" href="css/footer.css">
    <link rel="stylesheet" href="css/blog.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/loading.css">
    <script src="js/loading.js"></script>
</head>

<body>
    <div id="navbar-container"></div>

    <main class="blog-main" style="padding-top: 0;">
        <!-- Blog Header -->
        <section class="blog-header slide-up"
            style="position: relative; height: 50vh; min-height: 400px; display: flex; align-items: flex-end; justify-content: center; overflow: hidden; padding: 80px 4% 2rem;">
            <video autoplay loop muted playsinline
                style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0;"
                poster="images/hero_bg.webp">
                <source src="videos/video2.mp4" type="video/mp4">
            </video>

            <div
                style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to bottom, rgba(3,7,18,0.3) 0%, rgba(3,7,18,0.6) 60%, var(--bg-primary) 100%); z-index: 1;">
            </div>

            <div style="position: relative; z-index: 2; width: 100%;">
                <h1 class="blog-title">STACKLY News</h1>
                <p class="blog-subtitle">Latest news, movie reviews, and OTT updates straight from the industry.</p>
            </div>
        </section>

        <!-- Featured Article -->
        <section class="featured-article slide-up">
            <div class="featured-card">
                <div class="featured-img-wrapper">
                    <img src="images/tamil3.webp" alt="Featured News"
                        onerror="this.src='https://images.unsplash.com/photo-1535016120720-40c746a6580c?q=80&w=1280'">
                    <div class="featured-overlay">
                        <span class="blog-category">Upcoming Releases</span>
                        <h2 class="featured-title">The highly anticipated sci-fi epic arrives this summer in 4K HDR.
                        </h2>
                        <div class="blog-meta">
                            <span><i class="fa-regular fa-calendar"></i> July 15, 2026</span>
                            <span><i class="fa-regular fa-clock"></i> 5 min read</span>
                        </div>
                        <button class="btn-read" onclick="window.location.href='404.html'">Read Article <i class="fa-solid fa-arrow-right"></i></button>
                    </div>
                </div>
            </div>
        </section>

        <!-- Blog Grid -->
        <section class="blog-grid-section slide-up">
            <h3 class="section-title">Trending Stories</h3>
            <div class="blog-grid" id="blog-grid">
                <!-- JS will inject articles -->
            </div>
        </section>
    </main>

    <div id="footer-container"></div>

    <script>
        async function loadComponents() {
            try {
                const navRes = await fetch('navbar.html');
                if (navRes.ok) document.getElementById('navbar-container').innerHTML = await navRes.text();

                const footRes = await fetch('footer.html');
                if (footRes.ok) document.getElementById('footer-container').innerHTML = await footRes.text();

                setTimeout(() => {
                    document.querySelectorAll('.nav-link').forEach(link => {
                        if (link.textContent === 'Blog') link.classList.add('active');
                        else link.classList.remove('active');
                    });
                }, 100);

                window.addEventListener('scroll', () => {
                    const nav = document.querySelector('.premium-navbar');
                    if (nav) nav.classList.toggle('scrolled', window.scrollY > 50);
                });

                // Mobile Menu Toggle
                setTimeout(() => {
                    const mobileBtn = document.querySelector('.mobile-toggle');
                    const navCenter = document.querySelector('.nav-center');
                    if (mobileBtn && navCenter) {
                        mobileBtn.addEventListener('click', () => {
                            navCenter.classList.toggle('mobile-active');
                        });
                    }

                    // Active Link Highlight
                    const currentUrl = window.location.pathname.split('/').pop() || 'index.html';
                    const navLinks = document.querySelectorAll('.nav-center .nav-link');
                    navLinks.forEach(link => {
                        if (link.getAttribute('href') === currentUrl) {
                            link.classList.add('active');
                        }
                    });
                }, 200);
            } catch (e) {
                console.log("Error loading components");
            }
        }

        const blogData = [
            { category: "Movie Reviews", title: "Why the new crime thriller is breaking all records this week.", date: "July 12, 2026", img: "images/poster2.webp" },
            { category: "OTT Updates", title: "STACKLY STREAM introduces new interactive viewing features.", date: "July 10, 2026", img: "images/poster3.webp" },
            { category: "Entertainment News", title: "Top 10 hidden gems you must watch on our platform.", date: "July 8, 2026", img: "images/tamil7.webp" },
            { category: "Upcoming Releases", title: "What's coming in August? A sneak peek at our original series.", date: "July 5, 2026", img: "images/poster5.webp" },
            { category: "Trending Stories", title: "Behind the scenes of the award-winning historical drama.", date: "July 2, 2026", img: "images/poster6.webp" },
            { category: "Movie Reviews", title: "An in-depth analysis of the controversial ending.", date: "June 30, 2026", img: "images/poster7.webp" }
        ];

        function renderBlog() {
            const grid = document.getElementById('blog-grid');
            let html = '';
            blogData.forEach(item => {
                html += `
                    <article class="blog-card">
                        <div class="blog-img">
                            <img src="${item.img}" alt="Blog Image" onerror="this.src='https://images.unsplash.com/photo-1478720568477-152d9b164e26?q=80&w=500'">
                            <span class="blog-badge">${item.category}</span>
                        </div>
                        <div class="blog-content">
                            <h4 class="blog-card-title">${item.title}</h4>
                            <div class="blog-meta">
                                <span><i class="fa-regular fa-calendar"></i> ${item.date}</span>
                            </div>
                            <a href="404.html" class="blog-link">Read More</a>
                        </div>
                    </article>
                `;
            });
            grid.innerHTML = html;
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadComponents();
            renderBlog();
        });
    </script>
</body>

</html>
