<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movies - STACKLY STREAM</title>
    <!-- Stylesheets -->
    <title>TV Shows - STACKLY STREAM</title>
    <!-- Stylesheets -->
    <link rel="stylesheet" href="css/index.css">
    <link rel="stylesheet" href="css/navbar.css">
    <link rel="stylesheet" href="css/footer.css">
    <link rel="stylesheet" href="css/home.css">
    <link rel="stylesheet" href="css/tvshows.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/loading.css">
    <script src="js/loading.js"></script>
</head>
<body>
    <div id="navbar-container"></div>

    <main style="padding-top: 80px;">
        <!-- New TV Shows Featured Section -->
        <section class="tvshows-featured-section slide-up">
            <div class="tvshows-featured-header">
                <h2><span class="red-line"></span> TV SHOWS</h2>
            </div>
            
            <div class="tvshows-hero-grid">
                <!-- Left: Big Featured Image -->
                <div class="tv-hero-main">
                    <img src="./images/hero_bg.webp" alt="Featured Show">
                    <a href="404.html" class="play-btn-large">
                        <i class="fa-solid fa-play"></i>
                    </a>
                </div>
                
                <!-- Right: Seasons & Episodes -->
                <div class="tv-hero-sidebar">
                    <div class="season-tabs">
                        <button class="season-btn active">Season 1</button>
                        <button class="season-btn">Season 2</button>
                        <button class="season-btn">Season 3</button>
                    </div>
                    
                    <div class="episode-list">
                        <!-- Episode Item -->
                        <div class="episode-item">
                            <div class="epi-thumb">
                                <img src="./images/tv1.webp" alt="Episode 1" onerror="this.src='https://images.unsplash.com/photo-1536440136628-849c177e76a1?q=80&w=200'">
                                <a href="404.html" class="epi-play-btn"><i class="fa-solid fa-play"></i></a>
                            </div>
                            <div class="epi-details">
                                <h3>Episode 01</h3>
                                <span class="epi-duration">2 : 15</span>
                                <a href="404.html" class="epi-trailer">Watch The Trailer</a>
                                <div class="epi-stats">
                                    <span><i class="fa-regular fa-thumbs-up"></i> 345</span>
                                    <span><i class="fa-regular fa-heart"></i> 34</span>
                                </div>
                            </div>
                        </div>
                        
                        <!-- Episode Item -->
                        <div class="episode-item">
                            <div class="epi-thumb">
                                <img src="./images/tv2.webp" alt="Episode 2" onerror="this.src='https://images.unsplash.com/photo-1536440136628-849c177e76a1?q=80&w=200'">
                                <a href="404.html" class="epi-play-btn"><i class="fa-solid fa-play"></i></a>
                            </div>
                            <div class="epi-details">
                                <h3>Episode 02</h3>
                                <span class="epi-duration">2 : 15</span>
                                <a href="404.html" class="epi-trailer">Watch The Trailer</a>
                                <div class="epi-stats">
                                    <span><i class="fa-regular fa-thumbs-up"></i> 345</span>
                                    <span><i class="fa-regular fa-heart"></i> 34</span>
                                </div>
                            </div>
                        </div>
                        
                        <!-- Episode Item -->
                        <div class="episode-item">
                            <div class="epi-thumb">
                                <img src="./images/tv3.webp" alt="Episode 3" onerror="this.src='https://images.unsplash.com/photo-1536440136628-849c177e76a1?q=80&w=200'">
                                <a href="404.html" class="epi-play-btn"><i class="fa-solid fa-play"></i></a>
                            </div>
                            <div class="epi-details">
                                <h3>Episode 03</h3>
                                <span class="epi-duration">2 : 15</span>
                                <a href="404.html" class="epi-trailer">Watch The Trailer</a>
                                <div class="epi-stats">
                                    <span><i class="fa-regular fa-thumbs-up"></i> 345</span>
                                    <span><i class="fa-regular fa-heart"></i> 34</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Filters moved below hero -->
            <div class="filter-bar" style="margin-top: 3rem;">
                <button class="filter-btn active" data-target="all">All</button>
                <button class="filter-btn" data-target="Netflix Originals">Netflix Originals</button>
                <button class="filter-btn" data-target="Disney Originals">Disney+ Originals</button>
                <button class="filter-btn" data-target="Trending Shows">Trending</button>
                <button class="filter-btn" data-target="Regional Shows">Regional</button>
            </div>
        </section>

        <!-- Dynamic Sliders Container -->
        <div id="sliders-container" class="slide-up">
            <!-- JavaScript will inject sliders here -->
        </div>
    </main>

    <div id="footer-container"></div>

    <!-- Vanilla JS logic -->
    <script>
        // 1. Inject Navbar & Footer
        async function loadComponents() {
            try {
                const navRes = await fetch('navbar.html');
                if(navRes.ok) document.getElementById('navbar-container').innerHTML = await navRes.text();
                
                const footRes = await fetch('footer.html');
                if(footRes.ok) document.getElementById('footer-container').innerHTML = await footRes.text();

                // Make TV Shows link active
                setTimeout(() => {
                    document.querySelectorAll('.nav-link').forEach(link => {
                        if(link.textContent === 'TV Shows') link.classList.add('active');
                        else link.classList.remove('active');
                    });
                }, 100);

                                window.addEventListener('scroll', () => {
                    const nav = document.querySelector('.premium-navbar');
                    if (nav) nav.classList.toggle('scrolled', window.scrollY > 50);
                });

                                    // Mobile Menu Toggle
                    setTimeout(() => {
                        const mobileBtn = document.querySelector('.mobile-toggle');
                        const navCenter = document.querySelector('.nav-center');
                        if(mobileBtn && navCenter) {
                            mobileBtn.addEventListener('click', () => {
                                navCenter.classList.toggle('mobile-active');
                            });
                        }
                        
                        // Active Link Highlight
                        const currentUrl = window.location.pathname.split('/').pop() || 'index.html';
                        const navLinks = document.querySelectorAll('.nav-center .nav-link');
                        navLinks.forEach(link => {
                            if(link.getAttribute('href') === currentUrl) {
                                link.classList.add('active');
                            }
                        });
                    }, 200);
            } catch (e) {
                console.log("Error loading components");
            }
        }

        // 2. Render Sliders
        const categories = [
            "Netflix Originals", "Prime Originals", "Disney Originals", 
            "SonyLIV", "ZEE5", "Regional Shows", "Popular Shows", "Trending Shows"
        ];
        
        const imageDB = {
            "Netflix Originals": [
                "./images/tv.webp", "./images/tv1.webp", "./images/tv2.webp", "./images/tv3.webp", "./images/tv4.webp",
                "./images/tv5.webp", "./images/tv6.webp", "./images/tv7.webp", "./images/tv8.webp", "./images/tv9.webp"
            ],
            "Prime Originals": [
                "./images/tv10.webp", "./images/tv11.webp", "./images/tv12.webp", "./images/tv13.webp", "./images/tv14.webp",
                "./images/tv15.webp", "./images/tv16.webp", "./images/tv17.webp", "./images/tv.webp", "./images/tv1.webp"
            ],
            "Disney Originals": [
                "./images/tv2.webp", "./images/tv3.webp", "./images/tv4.webp", "./images/tv5.webp", "./images/tv6.webp",
                "./images/tv7.webp", "./images/tv8.webp", "./images/tv9.webp", "./images/tv10.webp", "./images/tv11.webp"
            ],
            "SonyLIV": [
                "./images/tv12.webp", "./images/tv13.webp", "./images/tv14.webp", "./images/tv15.webp", "./images/tv16.webp",
                "./images/tv17.webp", "./images/tv.webp", "./images/tv1.webp", "./images/tv2.webp", "./images/tv3.webp"
            ],
            "ZEE5": [
                "./images/tv4.webp", "./images/tv5.webp", "./images/tv6.webp", "./images/tv7.webp", "./images/tv8.webp",
                "./images/tv9.webp", "./images/tv10.webp", "./images/tv11.webp", "./images/tv12.webp", "./images/tv13.webp"
            ],
            "Regional Shows": [
                "./images/tv14.webp", "./images/tv15.webp", "./images/tv16.webp", "./images/tv17.webp", "./images/tv.webp",
                "./images/tv1.webp", "./images/tv2.webp", "./images/tv3.webp", "./images/tv4.webp", "./images/tv5.webp"
            ],
            "Popular Shows": [
                "./images/tv6.webp", "./images/tv7.webp", "./images/tv8.webp", "./images/tv9.webp", "./images/tv10.webp",
                "./images/tv11.webp", "./images/tv12.webp", "./images/tv13.webp", "./images/tv14.webp", "./images/tv15.webp"
            ],
            "Trending Shows": [
                "./images/tv16.webp", "./images/tv17.webp", "./images/tv.webp", "./images/tv1.webp", "./images/tv2.webp",
                "./images/tv3.webp", "./images/tv4.webp", "./images/tv5.webp", "./images/tv6.webp", "./images/tv7.webp"
            ]
        };
        const fallbackImages = ["./images/hero_bg.webp"];

        function generateCard(index, category) {
            let activePosters = imageDB[category] || fallbackImages;
            let tag = category;
            
            const poster = activePosters[index % activePosters.length];
            return `
                <div class="movie-card extended-card">
                    <img src="${poster}" alt="Movie Poster" onerror="this.src='https://images.unsplash.com/photo-1536440136628-849c177e76a1?q=80&w=500'">
                    
                    <div class="card-overlay extended-overlay">
                        <h4 class="card-title">Premium Movie ${index + 1}</h4>
                        
                        <div class="card-meta">
                            <span class="imdb-rating"><i class="fa-solid fa-star"></i> 8.${index%9}</span>
                            <span>202${index%6}</span>
                            <span>2h ${15 + (index%30)}m</span>
                        </div>
                        
                        <div class="card-tags">
                            <span class="card-tag">${tag}</span>
                            <span class="card-tag">HD</span>
                        </div>
                        
                        <div class="card-actions">
                            <button class="card-btn primary" onclick="window.location.href='404.html'"><i class="fa-solid fa-play"></i> Watch</button>
                            <button class="card-btn secondary" onclick="window.location.href='404.html'"><i class="fa-solid fa-film"></i> Trailer</button>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderSliders() {
            const container = document.getElementById('sliders-container');
            let html = '';
            
            categories.forEach(cat => {
                let cardsHtml = '';
                for(let i=0; i<10; i++) cardsHtml += generateCard(i, cat);
                
                html += `
                    <section class="slider-section" id="section-${cat.replace(/\s+/g, '-')}">
                        <h2 class="section-title">${cat}</h2>
                        <div class="slider-wrapper">
                            <button class="slider-control prev"><i class="fa-solid fa-chevron-left"></i></button>
                            <div class="slider-track">
                                ${cardsHtml}
                            </div>
                            <button class="slider-control next"><i class="fa-solid fa-chevron-right"></i></button>
                        </div>
                    </section>
                `;
            });
            container.innerHTML = html;
            initSliderControls();
        }

        function initSliderControls() {
            document.querySelectorAll('.slider-wrapper').forEach(wrapper => {
                const track = wrapper.querySelector('.slider-track');
                const prev = wrapper.querySelector('.prev');
                const next = wrapper.querySelector('.next');
                
                const scrollAmount = 800;
                
                next.addEventListener('click', () => {
                    track.scrollBy({ left: scrollAmount, behavior: 'smooth' });
                });
                
                prev.addEventListener('click', () => {
                    track.scrollBy({ left: -scrollAmount, behavior: 'smooth' });
                });
            });
        }

        function initFilters() {
            const btns = document.querySelectorAll('.filter-bar .filter-btn');
            btns.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    btns.forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                    
                    const target = e.target.getAttribute('data-target');
                    if (target === 'all') {
                        window.scrollTo({ top: 0, behavior: 'smooth' });
                    } else {
                        const sectionId = 'section-' + target.replace(/\s+/g, '-');
                        const section = document.getElementById(sectionId);
                        if (section) {
                            const yOffset = -100; // Account for fixed navbar
                            const y = section.getBoundingClientRect().top + window.pageYOffset + yOffset;
                            window.scrollTo({ top: y, behavior: 'smooth' });
                        }
                    }
                });
            });
        }

        function initSeasons() {
            const seasonBtns = document.querySelectorAll('.season-btn');
            const epiImages = document.querySelectorAll('.epi-thumb img');
            const mainHeroImg = document.querySelector('.tv-hero-main img');
            
            if (mainHeroImg) {
                mainHeroImg.style.transition = 'opacity 0.3s ease, transform 0.5s ease';
            }
            
            const seasonData = {
                'Season 1': {
                    main: './images/hero_bg.webp',
                    episodes: ['./images/tv1.webp', './images/tv2.webp', './images/tv3.webp']
                },
                'Season 2': {
                    main: './images/tv10.webp',
                    episodes: ['./images/tv4.webp', './images/tv5.webp', './images/tv6.webp']
                },
                'Season 3': {
                    main: './images/tv14.webp',
                    episodes: ['./images/tv7.webp', './images/tv8.webp', './images/tv9.webp']
                }
            };

            seasonBtns.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    seasonBtns.forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                    
                    const seasonName = e.target.textContent.trim();
                    const data = seasonData[seasonName];
                    
                    if (data) {
                        // Change main hero image
                        if (mainHeroImg) {
                            mainHeroImg.style.opacity = '0';
                            setTimeout(() => {
                                mainHeroImg.src = data.main;
                                mainHeroImg.style.opacity = '1';
                            }, 300);
                        }
                        
                        // Change episode thumbnails
                        epiImages.forEach((img, index) => {
                            if (data.episodes[index]) {
                                img.style.opacity = '0';
                                setTimeout(() => {
                                    img.src = data.episodes[index];
                                    img.style.opacity = '0.8';
                                }, 300);
                            }
                        });
                    }
                });
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadComponents();
            renderSliders();
            initFilters();
            initSeasons();
        });
    </script>
</body>
</html>
