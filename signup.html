<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - STACKLY STREAM</title>
    <!-- Stylesheets -->
    <link rel="stylesheet" href="css/index.css">
    <link rel="stylesheet" href="css/login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/loading.css">
    <script src="js/loading.js"></script>
</head>
<body>

    <main class="login-split-main">
        <!-- Left Side: Cinematic Branding -->
        <div class="login-left">
            <video autoplay loop muted playsinline class="login-bg-video">
                <source src="videos/video4.mp4" type="video/mp4">
            </video>
            <div class="login-left-overlay"></div>
            <div class="login-left-content fade-in">
                <img src="images/logo.webp" alt="STACKLY Logo" class="login-brand-logo">
                <h1 class="left-title">Join the club!</h1>
                <p class="left-subtitle">Create an account today to start streaming unlimited premium movies and shows.</p>
                <a href="home.html" class="btn-back-home"><i class="fa-solid fa-arrow-left"></i> BACK TO HOME</a>
            </div>
        </div>

        <!-- Right Side: Signup Form -->
        <div class="login-right">
            <div class="login-right-container slide-up" style="max-width: 500px;">
                <div class="login-header-text">
                    <h2>Create your account</h2>
                    <p>Already have an account? <a href="login.html" class="highlight-link">Log In</a></p>
                </div>

                <form class="login-form" onsubmit="event.preventDefault(); const role = document.getElementById('signup-role-select').value; const name = document.getElementById('signup-name').value; const email = document.getElementById('signup-email').value; localStorage.setItem('registeredName', name); localStorage.setItem('registeredEmail', email); localStorage.setItem('registeredRole', role); window.location.href='login.html';">
                    
                    <div class="form-group">
                        <label class="form-label">Sign up as</label>
                        <div class="select-wrapper">
                            <select class="form-input custom-select" id="signup-role-select" required>
                                <option value="user">User</option>
                                <option value="admin">Admin</option>
                            </select>
                            <i class="fa-solid fa-chevron-down select-icon"></i>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Name</label>
                        <div class="input-wrapper">
                            <input type="text" id="signup-name" class="form-input" placeholder="Enter Your Name" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Email</label>
                        <div class="input-wrapper">
                            <input type="email" id="signup-email" class="form-input" placeholder="Enter Your Email" required>
                        </div>
                    </div>

                    <div class="form-row" style="display: flex; gap: 15px;">
                        <div class="form-group" style="flex: 1;">
                            <label class="form-label">Password</label>
                            <div class="input-wrapper">
                                <input type="password" class="form-input" placeholder="Password" required>
                            </div>
                        </div>
                        <div class="form-group" style="flex: 1;">
                            <label class="form-label">Confirm Password</label>
                            <div class="input-wrapper">
                                <input type="password" class="form-input" placeholder="Confirm Password" required>
                            </div>
                        </div>
                    </div>

                    <div class="form-options">
                        <label class="remember-me">
                            <input type="checkbox" required>
                            <span>I agree to the <a href="404.html" class="highlight-link" style="font-weight: normal;">Terms & Conditions</a></span>
                        </label>
                    </div>

                    <button type="submit" class="btn-login-submit">
                        SIGN UP
                    </button>
                </form>

                <div class="login-divider">
                    <span>Or create with</span>
                </div>

                <div class="social-login-group">
                    <button type="button" class="btn-social-login" onclick="window.location.href='404.html'">
                        <i class="fa-brands fa-facebook"></i> Facebook
                    </button>
                    <button type="button" class="btn-social-login" onclick="window.location.href='404.html'">
                        <i class="fa-brands fa-google"></i> Google
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // No navbar/footer injection needed for the new signup layout
        });
    </script>
</body>
</html>
