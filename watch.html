<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watching - STACKLY STREAM</title>
    <link rel="stylesheet" href="css/index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #fff;
            font-family: 'Inter', sans-serif;
            overflow: hidden; /* Hide scrollbars for full cinematic feel */
        }
        
        .player-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
        }

        .back-btn {
            position: absolute;
            top: 30px;
            left: 30px;
            z-index: 100;
            color: white;
            text-decoration: none;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px 20px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateX(-5px);
        }

        .video-player {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        /* Optional: Add a title overlay that fades out */
        .video-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, transparent 20%);
            pointer-events: none;
            opacity: 1;
            transition: opacity 0.5s ease;
            z-index: 50;
        }
        
        .player-container:hover .video-overlay {
            opacity: 1;
        }

        /* Mobile specific fixes */
        @media (max-width: 768px) {
            .video-player {
                object-fit: contain; /* Shows correct proportions instead of cropping */
                width: 100%;
                height: auto;
                max-height: 100vh;
            }
        }
    </style>
</head>
<body>
    <div class="player-container" id="player-wrapper">
        <a href="index.html" class="back-btn">
            <i class="fa-solid fa-arrow-left"></i> Back to Browse
        </a>
        
        <div class="video-overlay"></div>
        
        <video class="video-player" controls autoplay>
            <source src="videos/video1.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
    </div>
    
    <script>
        // Simple script to hide overlay when mouse is idle
        let timeout;
        const wrapper = document.getElementById('player-wrapper');
        const overlay = document.querySelector('.video-overlay');
        const backBtn = document.querySelector('.back-btn');

        function hideControls() {
            overlay.style.opacity = '0';
            backBtn.style.opacity = '0';
            wrapper.style.cursor = 'none';
        }

        function showControls() {
            overlay.style.opacity = '1';
            backBtn.style.opacity = '1';
            wrapper.style.cursor = 'default';
            clearTimeout(timeout);
            timeout = setTimeout(hideControls, 3000);
        }

        wrapper.addEventListener('mousemove', showControls);
        wrapper.addEventListener('click', showControls);
        
        // Initial setup
        timeout = setTimeout(hideControls, 3000);
    </script>
</body>
</html>
