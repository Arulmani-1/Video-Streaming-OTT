<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Dashboard - STACKLY STREAM</title>
    <!-- Stylesheets -->
    <link rel="stylesheet" href="css/index.css">
    <link rel="stylesheet" href="css/navbar.css">
    <link rel="stylesheet" href="css/footer.css">
    <link rel="stylesheet" href="css/user_dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/loading.css">
    <script src="js/loading.js"></script>
</head>
<body>
    <main class="dashboard-container">
        <div class="sidebar-overlay" id="sidebar-overlay"></div>
        <!-- Sidebar -->
        <aside class="dashboard-sidebar slide-up">
            <div class="sidebar-brand" style="cursor: pointer;" onclick="window.location.href='user_dashboard.html'">
                <img src="images/logo.webp" alt="STACKLY" style="height: 55px; width: auto; object-fit: contain;">
            </div>
            <ul class="sidebar-menu">
                <li><a href="user_dashboard.html" ><i class="fa-solid fa-house"></i> Overview</a></li>
                <li><a href="user_watch_history.html" class="active"><i class="fa-solid fa-clock-rotate-left"></i> Watch History</a></li>
                <li><a href="user_my_list.html"><i class="fa-solid fa-list"></i> My List</a></li>
                <li><a href="user_subscription.html"><i class="fa-solid fa-credit-card"></i> Subscription</a></li>
                <li><a href="user_settings.html"><i class="fa-solid fa-gear"></i> Settings</a></li>
            </ul>
        </aside>

        <!-- Main Content Area -->
        <div class="dashboard-main-wrapper">
            <!-- Dashboard Top Navbar -->
            <header class="dashboard-topbar">
                <button class="mobile-sidebar-btn" id="mobile-sidebar-toggle"><i class="fa-solid fa-bars"></i></button>
                <div class="topbar-welcome">
                    <h2 style="font-size: 1.2rem; font-weight: 600; margin: 0;">Welcome back, User!</h2>
                </div>
                <div class="topbar-actions">
                    <span id="display-email" style="color: white; font-weight: 600;">user@example.com</span>
                    <a href="index.html" class="btn-action" style="text-decoration: none; display: flex; align-items: center; gap: 8px;" onclick="localStorage.removeItem('userEmail')">
                        <i class="fa-solid fa-arrow-right-from-bracket"></i> Logout
                    </a>
                </div>
            </header>

            <section class="dashboard-content fade-in">
                <div class="dashboard-header">
                <h1 class="dashboard-title">Watch History</h1>
                <p class="dashboard-subtitle">Everything you watched recently</p>
                <!-- Content Grid -->
                <div class="content-grid">
                    <!-- Item 1 -->
                    <div class="content-card">
                        <img src="images/hollywood3.webp" class="content-thumb" alt="Movie">
                        <div class="content-info">
                            <h3 class="content-title">Stranger Things</h3>
                            <p class="content-meta">S4 E1 • 45m remaining</p>
                            <div class="progress-bar-container">
                                <div class="progress-bar" style="width: 60%;"></div>
                            </div>
                        </div>
                        <button class="remove-btn" title="Remove from history"><i class="fa-solid fa-xmark"></i></button>
                    </div>

                    <!-- Item 2 -->
                    <div class="content-card">
                        <img src="images/tv1.webp" class="content-thumb" alt="Show">
                        <div class="content-info">
                            <h3 class="content-title">Breaking Bad</h3>
                            <p class="content-meta">S1 E5 • 10m remaining</p>
                            <div class="progress-bar-container">
                                <div class="progress-bar" style="width: 85%;"></div>
                            </div>
                        </div>
                        <button class="remove-btn" title="Remove from history"><i class="fa-solid fa-xmark"></i></button>
                    </div>

                    <!-- Item 3 -->
                    <div class="content-card">
                        <img src="images/tamil.webp" class="content-thumb" alt="Movie">
                        <div class="content-info">
                            <h3 class="content-title">Vikram</h3>
                            <p class="content-meta">Watched</p>
                            <div class="progress-bar-container">
                                <div class="progress-bar" style="width: 100%;"></div>
                            </div>
                        </div>
                        <button class="remove-btn" title="Remove from history"><i class="fa-solid fa-xmark"></i></button>
                    </div>
                </div>
            </section>
        </div>
    </main>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const email = localStorage.getItem('userEmail') || 'user@example.com';
            const name = localStorage.getItem('currentName') || 'User';
            document.getElementById('display-email').textContent = email;
            const welcomeHeader = document.querySelector('.topbar-welcome h2');
            if (welcomeHeader) {
                welcomeHeader.textContent = `Welcome back, ${name}!`;
            }
        });
    </script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const sidebar = document.querySelector('.dashboard-sidebar');
            const toggleBtn = document.getElementById('mobile-sidebar-toggle');
            const overlay = document.getElementById('sidebar-overlay');

            if(toggleBtn && sidebar && overlay) {
                toggleBtn.addEventListener('click', () => {
                    sidebar.classList.add('active');
                    overlay.classList.add('active');
                });

                overlay.addEventListener('click', () => {
                    sidebar.classList.remove('active');
                    overlay.classList.remove('active');
                });

                const sidebarLinks = sidebar.querySelectorAll('a');
                sidebarLinks.forEach(link => {
                    link.addEventListener('click', () => {
                        sidebar.classList.remove('active');
                        overlay.classList.remove('active');
                    });
                });
            }
        });
    </script>
</body>

</html>
